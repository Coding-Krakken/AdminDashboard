# Reverse proxy template for host app + Universal Admin sidecar.
#
# Expected routing:
# - Host app: http://host-app:3000
# - Admin sidecar: http://admin-sidecar:4100
#
# Map in your local hosts / DNS as needed.

upstream host_app {
  server host-app:3000;
}

upstream admin_sidecar {
  server admin-sidecar:4100;
}

server {
  listen 80;
  server_name _;

  # Admin UI
  location /admin {
    proxy_pass http://admin_sidecar;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /admin/ {
    proxy_pass http://admin_sidecar/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Admin APIs
  location /api/admin/ {
    proxy_pass http://admin_sidecar/api/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Everything else to host app
  location / {
    proxy_pass http://host_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }
}
