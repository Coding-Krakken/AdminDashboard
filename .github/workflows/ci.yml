name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify Config
        run: npm run verify:config

      - name: Verify Generated Modules
        run: npm run verify:generated

      - name: Verify Plugins
        run: npm run verify:plugins

      - name: Verify Migration Readiness
        run: npm run verify:migration-readiness

      - name: Verify Admin API Policy
        run: npm run verify:admin-policy

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
